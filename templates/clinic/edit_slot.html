{% extends 'clinic/base.html' %}
{% block title %}Edit Slot{% endblock %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-warning">
                <h4 class="mb-0">Edit Appointment Slot</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Doctor</label>
                        <select name="doctor" class="form-select">
                            {% for doctor in doctors %}
                                <option value="{{ doctor.id }}" {% if doctor.id == slot.doctor.id %}selected{% endif %}>
                                    {{ doctor.name }} - {{ doctor.get_specialty_display }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Date</label>
                        <input type="date" name="date" class="form-control" value="{{ slot.date|date:'Y-m-d' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Time</label>
                        <input type="time" name="time" class="form-control" value="{{ slot.time|time:'H:i' }}">
                    </div>
                    <div class="form-check mb-3">
                        <input type="checkbox" name="is_booked" class="form-check-input" id="is_booked"
                               {% if slot.is_booked %}checked{% endif %}>
                        <label class="form-check-label" for="is_booked">Booked</label>
                    </div>
                    <button type="submit" class="btn btn-warning w-100">Update Slot</button>
                </form>
                <div class="mt-3 text-center">
                    <a href="{% url 'manage_slots' %}">Back</a>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
