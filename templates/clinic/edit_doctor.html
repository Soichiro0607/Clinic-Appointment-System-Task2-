{% extends 'clinic/base.html' %}
{% block title %}Edit Doctor{% endblock %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-warning">
                <h4 class="mb-0">Edit Doctor</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Name</label>
                        <input type="text" name="name" class="form-control" value="{{ doctor.name }}">
                    </div>
                    <div class="mb-3">
                       <label class="form-label">Specialty</label>
                        <p class="text-muted">Current specialty: {{ doctor.get_specialty_display }}</p>
                        <select name="specialty" class="form-select">
                            <option value="GP">General Practice</option>
                            <option value="SUR">Surgery</option>
                            <option value="PED">Pediatrics</option>
                            <option value="CAR">Cardiology</option>
                            <option value="DER">Dermatology</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-warning w-100">Update Doctor</button>
                </form>

                <div class="mt-3 text-center">
                    <a href="{% url 'manage_doctors' %}">Back</a>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
